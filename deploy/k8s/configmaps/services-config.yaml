apiVersion: v1
kind: ConfigMap
metadata:
  name: services-config
  namespace: microservices
data:
  # Database
  DB_PORT:      "3306"
  DB_USER:      "admin"
  NODE_ENV:     "production"

  # Service discovery (internal K8s DNS)
  USER_SERVICE_URL:    "http://user-service:3001"
  ORDER_SERVICE_URL:   "http://order-service:3002"
  PRODUCT_SERVICE_URL: "http://product-service:80"
  PAYMENT_SERVICE_URL: "http://payment-service:80"

  # Per-service DB names
  USERS_DB_NAME:    "users_db"
  ORDERS_DB_NAME:   "orders_db"
  PRODUCTS_DB_NAME: "products_db"
  PAYMENTS_DB_NAME: "payments_db"
