version: '3.9'

# Instance 2 — App Services
# Runs: user, order, product, payment, notification services
# Exposes service ports to the web instance (via security group)
# Required env vars: KAFKA_HOST, RDS_HOST, RDS_USER, RDS_PASSWORD, JWT_SECRET,
#                    ECR_BASE, PRODUCT_APP_KEY, PAYMENT_APP_KEY,
#                    ADMIN_EMAIL, ADMIN_PASSWORD, ADMIN_NAME

services:

  user-service:
    image: ${ECR_BASE}/user-service:latest
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: ${RDS_HOST}
      DB_PORT: 3306
      DB_NAME: users_db
      DB_USER: ${RDS_USER}
      DB_PASSWORD: ${RDS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@1234}
      ADMIN_NAME: ${ADMIN_NAME:-Super Admin}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks: [microservices]

  order-service:
    image: ${ECR_BASE}/order-service:latest
    container_name: order-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: ${RDS_HOST}
      DB_PORT: 3306
      DB_NAME: orders_db
      DB_USER: ${RDS_USER}
      DB_PASSWORD: ${RDS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:3001
      NODE_ENV: production
      KAFKA_BROKER: ${KAFKA_HOST}:9092
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks: [microservices]

  product-service:
    image: ${ECR_BASE}/product-service:latest
    container_name: product-service
    ports:
      - "8001:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${PRODUCT_APP_KEY}
      DB_HOST: ${RDS_HOST}
      DB_PORT: 3306
      DB_NAME: products_db
      DB_USER: ${RDS_USER}
      DB_PASSWORD: ${RDS_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/up"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks: [microservices]

  payment-service:
    image: ${ECR_BASE}/payment-service:latest
    container_name: payment-service
    ports:
      - "8002:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${PAYMENT_APP_KEY}
      DB_HOST: ${RDS_HOST}
      DB_PORT: 3306
      DB_NAME: payments_db
      DB_USER: ${RDS_USER}
      DB_PASSWORD: ${RDS_PASSWORD}
      ORDER_SERVICE_URL: http://order-service:3002
      KAFKA_BROKER: ${KAFKA_HOST}:9092
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/up"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks: [microservices]

  notification-service:
    image: ${ECR_BASE}/notification-service:latest
    container_name: notification-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: ${RDS_HOST}
      DB_PORT: 3306
      DB_NAME: notifications_db
      DB_USER: ${RDS_USER}
      DB_PASSWORD: ${RDS_PASSWORD}
      NODE_ENV: production
      KAFKA_BROKER: ${KAFKA_HOST}:9092
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks: [microservices]

networks:
  microservices:
    driver: bridge
