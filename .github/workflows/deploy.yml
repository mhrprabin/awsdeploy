name: Build, Push to ECR & Deploy to EC2 (3 instances)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_BASE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

# ─────────────────────────────────────────────────────────────────────────────
# GitHub Secrets  (Settings → Secrets and variables → Actions → Secrets):
#
#   AWS_ACCOUNT_ID          12-digit AWS account ID
#   AWS_ACCESS_KEY_ID       IAM key (AmazonEC2ContainerRegistryFullAccess)
#   AWS_SECRET_ACCESS_KEY
#
#   EC2_SSH_KEY             Contents of your .pem file
#   EC2_USER                ubuntu
#
#   EC2_HOST_INFRA          Elastic IP of Instance 1 (Kafka)
#   EC2_HOST_APP            Elastic IP of Instance 2 (services)
#   EC2_HOST_WEB            Elastic IP of Instance 3 (gateway + frontend)
#
#   KAFKA_HOST              Private IP of Instance 1  ← from AWS console
#   APP_HOST                Private IP of Instance 2  ← from AWS console
#
#   RDS_HOST                RDS endpoint
#   RDS_USER                e.g. admin
#   RDS_PASSWORD
#   JWT_SECRET              openssl rand -hex 32
#   ADMIN_EMAIL
#   ADMIN_PASSWORD
#   ADMIN_NAME
#   PRODUCT_APP_KEY         base64:$(openssl rand -base64 32)
#   PAYMENT_APP_KEY         base64:$(openssl rand -base64 32)
#
# GitHub Variables  (Settings → Secrets and variables → Actions → Variables):
#   AWS_REGION              e.g. us-east-1
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build all 7 images in parallel and push to ECR
  # ════════════════════════════════════════════════════════════════════════════

  build:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            context: services/user-service
          - service: order-service
            context: services/order-service
          - service: product-service
            context: services/product-service
          - service: payment-service
            context: services/payment-service
          - service: notification-service
            context: services/notification-service
          - service: gateway
            context: gateway
          - service: frontend
            context: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ matrix.service }}" \
            --region "${{ vars.AWS_REGION }}" > /dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ matrix.service }}" \
            --region "${{ vars.AWS_REGION }}" > /dev/null

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.ECR_BASE }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_BASE }}/${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ env.ECR_BASE }}/${{ matrix.service }}:latest
          cache-to: type=inline

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Deploy to Instance 1 (Kafka)
  # ════════════════════════════════════════════════════════════════════════════

  deploy-infra:
    name: Deploy — Instance 1 (Kafka)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 10 -H "${{ secrets.EC2_HOST_INFRA }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<'EOF'
          Host *
            StrictHostKeyChecking accept-new
            ConnectTimeout 15
          EOF

      - name: Deploy Kafka
        run: |
          ENV_B64=$(printf 'ECR_BASE=%s\nAWS_REGION=%s\nKAFKA_HOST=%s\nIMAGE_TAG=%s\n' \
            '${{ env.ECR_BASE }}' '${{ vars.AWS_REGION }}' '${{ secrets.KAFKA_HOST }}' \
            '${{ github.sha }}' \
            | base64 -w0)
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_INFRA }} \
            ENV_B64="$ENV_B64" \
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            bash -s <<'ENDSSH'
            set -e
            if [ ! -d ~/microservice/.git ]; then
              rm -rf ~/microservice
              git clone https://github.com/${{ github.repository }}.git ~/microservice
            fi
            cd ~/microservice
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
            echo "$ENV_B64" | base64 -d > .env.ec2
            set -o allexport && source .env.ec2 && set +o allexport
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_BASE"
            docker compose -f deploy/ec2/docker-compose.infra.yml up -d --remove-orphans
            docker image prune -f
            docker compose -f deploy/ec2/docker-compose.infra.yml ps
          ENDSSH

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy to Instance 2 (App Services)
  # Waits for Kafka to be up first
  # ════════════════════════════════════════════════════════════════════════════

  deploy-app:
    name: Deploy — Instance 2 (Services)
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 10 -H "${{ secrets.EC2_HOST_APP }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<'EOF'
          Host *
            StrictHostKeyChecking accept-new
            ConnectTimeout 15
          EOF

      - name: Deploy App Services
        run: |
          ENV_B64=$(printf 'ECR_BASE=%s\nAWS_REGION=%s\nKAFKA_HOST=%s\nRDS_HOST=%s\nRDS_USER=%s\nRDS_PASSWORD=%s\nJWT_SECRET=%s\nADMIN_EMAIL=%s\nADMIN_PASSWORD=%s\nADMIN_NAME=%s\nPRODUCT_APP_KEY=%s\nPAYMENT_APP_KEY=%s\nIMAGE_TAG=%s\n' \
            '${{ env.ECR_BASE }}' '${{ vars.AWS_REGION }}' '${{ secrets.KAFKA_HOST }}' \
            '${{ secrets.RDS_HOST }}' '${{ secrets.RDS_USER }}' '${{ secrets.RDS_PASSWORD }}' \
            '${{ secrets.JWT_SECRET }}' '${{ secrets.ADMIN_EMAIL }}' '${{ secrets.ADMIN_PASSWORD }}' \
            '${{ secrets.ADMIN_NAME }}' '${{ secrets.PRODUCT_APP_KEY }}' '${{ secrets.PAYMENT_APP_KEY }}' \
            '${{ github.sha }}' \
            | base64 -w0)
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_APP }} \
            ENV_B64="$ENV_B64" \
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            bash -s <<'ENDSSH'
            set -e
            if [ ! -d ~/microservice/.git ]; then
              rm -rf ~/microservice
              git clone https://github.com/${{ github.repository }}.git ~/microservice
            fi
            cd ~/microservice
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
            echo "$ENV_B64" | base64 -d > .env.ec2
            set -o allexport && source .env.ec2 && set +o allexport
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_BASE"

            # Install mysql client if missing
            if ! command -v mysql &>/dev/null; then
              sudo apt-get install -y mysql-client 2>/dev/null || \
              sudo yum install -y mysql 2>/dev/null || true
            fi

            # Run DB init — creates all databases and tables (idempotent)
            mysql -h "$RDS_HOST" -u "$RDS_USER" -p"$RDS_PASSWORD" \
              < ~/microservice/deploy/db/init.sql

            docker compose -f deploy/ec2/docker-compose.app.yml pull
            docker compose -f deploy/ec2/docker-compose.app.yml up -d --remove-orphans
            docker image prune -f
            docker compose -f deploy/ec2/docker-compose.app.yml ps
          ENDSSH

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — Deploy to Instance 3 (Gateway + Frontend)
  # Waits for app services to be up first
  # ════════════════════════════════════════════════════════════════════════════

  deploy-web:
    name: Deploy — Instance 3 (Gateway + Frontend)
    runs-on: ubuntu-latest
    needs: deploy-app
    environment:
      name: production
      url: http://${{ vars.EC2_HOST_WEB }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 10 -H "${{ secrets.EC2_HOST_WEB }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<'EOF'
          Host *
            StrictHostKeyChecking accept-new
            ConnectTimeout 15
          EOF

      - name: Deploy Gateway + Frontend
        run: |
          ENV_B64=$(printf 'ECR_BASE=%s\nAWS_REGION=%s\nAPP_HOST=%s\nJWT_SECRET=%s\nIMAGE_TAG=%s\n' \
            '${{ env.ECR_BASE }}' '${{ vars.AWS_REGION }}' '${{ secrets.APP_HOST }}' '${{ secrets.JWT_SECRET }}' \
            '${{ github.sha }}' \
            | base64 -w0)
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_WEB }} \
            ENV_B64="$ENV_B64" \
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            bash -s <<'ENDSSH'
            set -e

            # Install Docker if missing
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              newgrp docker
            fi

            # Install AWS CLI v2 if missing
            if ! command -v aws &>/dev/null; then
              sudo apt-get install -y unzip curl 2>/dev/null || sudo yum install -y unzip curl 2>/dev/null || true
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
              unzip -q /tmp/awscliv2.zip -d /tmp
              sudo /tmp/aws/install
              rm -rf /tmp/awscliv2.zip /tmp/aws
            fi

            if [ ! -d ~/microservice/.git ]; then
              rm -rf ~/microservice
              git clone https://github.com/${{ github.repository }}.git ~/microservice
            fi
            cd ~/microservice
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
            echo "$ENV_B64" | base64 -d > .env.ec2
            set -o allexport && source .env.ec2 && set +o allexport
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_BASE"
            docker compose -f deploy/ec2/docker-compose.web.yml pull
            docker compose -f deploy/ec2/docker-compose.web.yml up -d --remove-orphans
            docker image prune -f
            docker compose -f deploy/ec2/docker-compose.web.yml ps
          ENDSSH

      - name: Print URLs
        run: |
          echo "✅ Deployed!"
          echo "  Frontend:  http://${{ vars.EC2_HOST_WEB }}:8080"
          echo "  API:       http://${{ vars.EC2_HOST_WEB }}/api"
