# Instance 3 — Web / Gateway
# Runs: gateway (port 80→443), frontend (port 8080)
# Required env vars: ECR_BASE, APP_HOST, JWT_SECRET, DOMAIN, IMAGE_TAG

services:

  gateway:
    image: ${ECR_BASE}/gateway:${IMAGE_TAG}
    container_name: gateway
    ports:
      - "80:80"
      - "443:443"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      APP_HOST: ${APP_HOST}
      DOMAIN: ${DOMAIN}
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    networks: [microservices]

  frontend:
    image: ${ECR_BASE}/frontend:${IMAGE_TAG}
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - gateway
    restart: unless-stopped
    networks: [microservices]

networks:
  microservices:
    driver: bridge
