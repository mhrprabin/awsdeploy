name: Build, Push to ECR & Deploy to EC2

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_BASE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets  (Settings → Secrets and variables → Actions):
#
#   AWS_ACCOUNT_ID          12-digit AWS account ID
#   AWS_ACCESS_KEY_ID       IAM key with ECR push permissions
#   AWS_SECRET_ACCESS_KEY   IAM secret
#   EC2_HOST                EC2 public IP or DNS
#   EC2_SSH_KEY             Full contents of your .pem file
#   EC2_USER                ubuntu
#   RDS_HOST                RDS endpoint
#   RDS_USER                RDS username (e.g. admin)
#   RDS_PASSWORD            RDS password
#   JWT_SECRET              Long random string
#   RABBITMQ_USER           e.g. guest
#   RABBITMQ_PASS           e.g. guest
#   ADMIN_EMAIL             Seeded admin email
#   ADMIN_PASSWORD          Seeded admin password
#   ADMIN_NAME              Seeded admin name
#   PRODUCT_APP_KEY         Laravel app key (base64:...)
#   PAYMENT_APP_KEY         Laravel app key (base64:...)
#
# Required GitHub Variables  (Settings → Secrets and variables → Variables):
#   AWS_REGION              e.g. us-east-1
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build all Docker images in parallel and push to ECR
  # ════════════════════════════════════════════════════════════════════════════

  build:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            context: services/user-service
          - service: order-service
            context: services/order-service
          - service: product-service
            context: services/product-service
          - service: payment-service
            context: services/payment-service
          - service: notification-service
            context: services/notification-service
          - service: gateway
            context: gateway
          - service: frontend
            context: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if missing
        run: |
          aws ecr describe-repositories --repository-names "${{ matrix.service }}" \
            --region "${{ vars.AWS_REGION }}" > /dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ matrix.service }}" \
            --region "${{ vars.AWS_REGION }}" > /dev/null

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.ECR_BASE }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_BASE }}/${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ env.ECR_BASE }}/${{ matrix.service }}:latest
          cache-to: type=inline

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — SSH into EC2, update code, pull images, restart services
  # ════════════════════════════════════════════════════════════════════════════

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: http://${{ secrets.EC2_HOST }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Write .env.ec2 on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cat > ~/microservice/.env.ec2" <<'EOF'
          ECR_BASE=${{ env.ECR_BASE }}
          AWS_REGION=${{ vars.AWS_REGION }}
          RDS_HOST=${{ secrets.RDS_HOST }}
          RDS_USER=${{ secrets.RDS_USER }}
          RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NAME=${{ secrets.ADMIN_NAME }}
          PRODUCT_APP_KEY=${{ secrets.PRODUCT_APP_KEY }}
          PAYMENT_APP_KEY=${{ secrets.PAYMENT_APP_KEY }}
          EOF

      - name: Deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash -s <<'ENDSSH'
            set -e
            cd ~/microservice

            echo ">>> Pulling latest code..."
            git pull origin $(git rev-parse --abbrev-ref HEAD)

            echo ">>> Loading env..."
            set -o allexport
            source .env.ec2
            set +o allexport

            echo ">>> Authenticating with ECR..."
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_BASE"

            echo ">>> Pulling new images..."
            docker compose -f deploy/ec2/docker-compose.ec2.yml pull

            echo ">>> Restarting services..."
            docker compose -f deploy/ec2/docker-compose.ec2.yml up -d --remove-orphans

            echo ">>> Removing unused images..."
            docker image prune -f

            echo ">>> Service status:"
            docker compose -f deploy/ec2/docker-compose.ec2.yml ps
          ENDSSH

      - name: Print deployment URL
        run: |
          echo "✅ Deployed to http://${{ secrets.EC2_HOST }}"
          echo "   Frontend:  http://${{ secrets.EC2_HOST }}:8080"
          echo "   API:       http://${{ secrets.EC2_HOST }}/api"
