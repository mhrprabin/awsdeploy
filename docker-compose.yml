version: '3.9'

# Secrets/config come from .env (copy .env.example → .env)
# Never hardcode credentials here.

services:

  # ── MySQL (simulates RDS locally) ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: appuser
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [microservices]

  # ── Node.js User Service ───────────────────────────────────────────────────
  user-service:
    build: ./services/user-service
    container_name: user-service
    env_file: .env
    environment:
      PORT: 3001
      DB_NAME: users_db
      NODE_ENV: production
      ADMIN_EMAIL:    ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@1234}
      ADMIN_NAME:     ${ADMIN_NAME:-Super Admin}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      mysql:
        condition: service_healthy
    networks: [microservices]

  # ── Node.js Order Service ──────────────────────────────────────────────────
  order-service:
    build: ./services/order-service
    container_name: order-service
    env_file: .env
    environment:
      PORT: 3002
      DB_NAME: orders_db
      USER_SERVICE_URL: http://user-service:3001
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      mysql:
        condition: service_healthy
    networks: [microservices]

  # ── Laravel Product Service ───────────────────────────────────────────────
  product-service:
    build: ./services/product-service
    container_name: product-service
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${PRODUCT_APP_KEY:-}   # set in .env; auto-generated on first boot if blank
      DB_NAME: products_db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/up"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s    # Laravel needs time for migrate + config:cache on boot
    depends_on:
      mysql:
        condition: service_healthy
    networks: [microservices]

  # ── Laravel Payment Service ───────────────────────────────────────────────
  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${PAYMENT_APP_KEY:-}
      DB_NAME: payments_db
      ORDER_SERVICE_URL: http://order-service:3002
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/up"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
    networks: [microservices]

  # ── NGINX/OpenResty API Gateway ────────────────────────────────────────────
  gateway:
    build: ./gateway
    container_name: gateway
    env_file: .env
    ports:
      - "80:80"           # Only the gateway is publicly exposed
    depends_on:
      user-service:    { condition: service_healthy }
      order-service:   { condition: service_healthy }
      product-service: { condition: service_healthy }
      payment-service: { condition: service_healthy }
    networks: [microservices]

  # ── Vue.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    depends_on: [gateway]
    networks: [microservices]

volumes:
  mysql_data:

networks:
  microservices:
    driver: bridge
