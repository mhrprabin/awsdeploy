apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: microservices
type: Opaque
stringData:
  # Replace these values before applying
  RDS_HOST: "your-rds-endpoint.rds.amazonaws.com"
  RDS_USER: "admin"
  RDS_PASSWORD: "your-rds-password"
  JWT_SECRET: "your-super-secret-jwt-key-change-in-prod"
